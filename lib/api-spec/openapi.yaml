openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sales
    description: Sales entry operations
  - name: reports
    description: Weekly report operations
  - name: settings
    description: App configuration settings
  - name: users
    description: Agency user management
  - name: storage
    description: Object storage upload and serving endpoints
  - name: leads
    description: Lead pipeline tracking
  - name: lead-sources
    description: Lead source management
  - name: metrics
    description: Sales metrics and dashboard analytics
  - name: call-logs
    description: Agent call activity tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List all sales entries
      parameters:
        - name: weekStart
          in: query
          required: false
          schema:
            type: string
          description: ISO date string for the start of the week filter
      responses:
        "200":
          description: List of sales entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleEntry"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a new sale entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "201":
          description: Created sale entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleEntry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales/{id}/paid:
    patch:
      operationId: markSalePaid
      tags: [sales]
      summary: Toggle the paid status of a sale (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paid:
                  type: boolean
              required:
                - paid
      responses:
        "200":
          description: Updated sale entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleEntry"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user's agency profile
      responses:
        "200":
          description: Current agency user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyUser"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyUser"

  /users:
    get:
      operationId: listAgencyUsers
      tags: [users]
      summary: List all agency users (admin only)
      responses:
        "200":
          description: List of agency users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgencyUser"

  /users/invite:
    post:
      operationId: inviteAgent
      tags: [users]
      summary: Invite a new agent by email (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                role:
                  type: string
                redirectUrl:
                  type: string
                  description: "URL to redirect the invited user to after accepting the invite"
              required:
                - email
      responses:
        "200":
          description: Invitation sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message

  /users/{id}:
    delete:
      operationId: removeUser
      tags: [users]
      summary: Remove a team member (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        "400":
          description: Cannot remove yourself
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
              required:
                - role
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyUser"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get a single sale entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSale
      tags: [sales]
      summary: Update a sale entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSaleBody"
      responses:
        "200":
          description: Updated sale entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSale
      tags: [sales]
      summary: Delete a sale entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales/summary/current-week:
    get:
      operationId: getCurrentWeekSummary
      tags: [sales]
      summary: Get summary stats for the current week
      responses:
        "200":
          description: Weekly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekSummary"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List all weekly reports
      responses:
        "200":
          description: List of sent weekly reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyReport"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a single weekly report with full sales detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report detail with sales breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDetail"
        "404":
          description: Report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current app settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/send:
    post:
      operationId: sendReport
      tags: [reports]
      summary: Manually trigger sending the weekly report now
      responses:
        "200":
          description: Report sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendReportResponse"
        "400":
          description: Error sending report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lead-sources:
    get:
      operationId: listLeadSources
      tags: [lead-sources]
      summary: List all lead sources
      responses:
        "200":
          description: List of lead sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadSource"
    post:
      operationId: createLeadSource
      tags: [lead-sources]
      summary: Create a lead source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                isPaid:
                  type: boolean
                costPerLead:
                  type: number
                  description: Default cost per lead for this source (used as fallback when no per-lead cost is set)
              required:
                - name
      responses:
        "201":
          description: Created lead source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadSource"

  /lead-sources/{id}:
    patch:
      operationId: updateLeadSource
      tags: [lead-sources]
      summary: Update a lead source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                isPaid:
                  type: boolean
                costPerLead:
                  type: number
                  description: Default cost per lead for this source
      responses:
        "200":
          description: Updated lead source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadSource"
    delete:
      operationId: deleteLeadSource
      tags: [lead-sources]
      summary: Delete a lead source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /lead-sources/{id}/payments:
    get:
      operationId: listLeadSourcePayments
      tags: [lead-sources]
      summary: List payments for a lead source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadSourcePayment"
    post:
      operationId: createLeadSourcePayment
      tags: [lead-sources]
      summary: Add a payment to a lead source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                paidDate:
                  type: string
                note:
                  type: string
                  nullable: true
              required:
                - amount
                - paidDate
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadSourcePayment"

  /lead-sources/{id}/payments/{paymentId}:
    delete:
      operationId: deleteLeadSourcePayment
      tags: [lead-sources]
      summary: Delete a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /leads/import:
    post:
      operationId: importLeads
      tags: [leads]
      summary: Bulk import leads from CSV data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                leads:
                  type: array
                  items:
                    type: object
                    properties:
                      firstName:
                        type: string
                      lastName:
                        type: string
                        nullable: true
                      phone:
                        type: string
                        nullable: true
                      email:
                        type: string
                        nullable: true
                      leadSource:
                        type: string
                        nullable: true
                      status:
                        type: string
                      enteredDate:
                        type: string
                      soldDate:
                        type: string
                        nullable: true
                      salesType:
                        type: string
                        nullable: true
                      commissionType:
                        type: string
                        nullable: true
                      carrier:
                        type: string
                        nullable: true
                      revenue:
                        type: number
                        nullable: true
                      costPerLead:
                        type: number
                        nullable: true
                      lineOfBusiness:
                        type: string
                        enum: [medicare, aca, ancillary, life, annuity]
                      ancillaryType:
                        type: string
                        nullable: true
                      notes:
                        type: string
                        nullable: true
                    required:
                      - firstName
                      - enteredDate
              required:
                - leads
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
                required:
                  - imported
                  - errors

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads (own for agents, all for admins)
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                leadOwnership:
                  type: string
                  enum: ["Agency BOB", "Self-Generated"]
                  nullable: true
                leadSourceId:
                  type: integer
                  nullable: true
                state:
                  type: string
                  nullable: true
                county:
                  type: string
                  nullable: true
                zip:
                  type: string
                  nullable: true
                marketplace:
                  type: string
                  enum: ["Yes", "No"]
                  nullable: true
                householdCount:
                  type: integer
                  nullable: true
                qualified:
                  type: string
                  enum: ["Yes", "No"]
                  nullable: true
                principal:
                  type: number
                  nullable: true
                faceValue:
                  type: number
                  nullable: true
                status:
                  type: string
                revenue:
                  type: number
                  nullable: true
                carrier:
                  type: string
                  nullable: true
                salesType:
                  type: string
                  nullable: true
                commissionType:
                  type: string
                  nullable: true
                costPerLead:
                  type: number
                  nullable: true
                lineOfBusiness:
                  type: string
                  enum: [medicare, aca, ancillary, life, annuity]
                ancillaryType:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                enteredDate:
                  type: string
                soldDate:
                  type: string
                  nullable: true
              required:
                - firstName
                - enteredDate
      responses:
        "201":
          description: Created lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead (including status change)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                leadOwnership:
                  type: string
                  enum: ["Agency BOB", "Self-Generated"]
                  nullable: true
                leadSourceId:
                  type: integer
                  nullable: true
                state:
                  type: string
                  nullable: true
                county:
                  type: string
                  nullable: true
                zip:
                  type: string
                  nullable: true
                marketplace:
                  type: string
                  enum: ["Yes", "No"]
                  nullable: true
                householdCount:
                  type: integer
                  nullable: true
                qualified:
                  type: string
                  enum: ["Yes", "No"]
                  nullable: true
                principal:
                  type: number
                  nullable: true
                faceValue:
                  type: number
                  nullable: true
                status:
                  type: string
                  enum: [new, in_comm, appt_set, follow_up, sold, lost]
                revenue:
                  type: number
                  nullable: true
                carrier:
                  type: string
                  nullable: true
                salesType:
                  type: string
                  nullable: true
                commissionType:
                  type: string
                  nullable: true
                costPerLead:
                  type: number
                  nullable: true
                lineOfBusiness:
                  type: string
                  enum: [medicare, aca, ancillary, life, annuity]
                ancillaryType:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                enteredDate:
                  type: string
                soldDate:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /metrics:
    get:
      operationId: getMetrics
      tags: [metrics]
      summary: Get computed sales metrics and pipeline analytics
      parameters:
        - in: query
          name: agentUserId
          schema:
            type: string
          required: false
          description: Filter metrics to a specific agent (admin only)
      responses:
        "200":
          description: Metrics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    $ref: "#/components/schemas/MetricsSummary"
                  leadSourcePerformance:
                    type: array
                    items:
                      type: object
                  leadSourcePipeline:
                    type: array
                    items:
                      type: object
                  carrierPerformance:
                    type: array
                    items:
                      type: object

  /call-logs:
    get:
      operationId: listCallLogs
      tags: [call-logs]
      summary: List call logs
      parameters:
        - in: query
          name: agentUserId
          schema:
            type: string
          required: false
        - in: query
          name: weekStart
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of call logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallLog"
    post:
      operationId: createCallLog
      tags: [call-logs]
      summary: Log a call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientName:
                  type: string
                contactType:
                  type: string
                  enum: [contacted, voicemail, text_message, no_answer]
                callDate:
                  type: string
                notes:
                  type: string
                  nullable: true
              required:
                - clientName
                - contactType
                - callDate
      responses:
        "201":
          description: Created call log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLog"

  /call-logs/{id}:
    delete:
      operationId: deleteCallLog
      tags: [call-logs]
      summary: Delete a call log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CommissionTableRow:
      type: object
      properties:
        salesSource:
          type: string
        salesType:
          type: string
        commissionType:
          type: string
        estimatedCommission:
          type: ["number", "null"]
      required:
        - salesSource
        - salesType
        - commissionType
        - estimatedCommission

    AppSettings:
      type: object
      properties:
        reportDayOfWeek:
          type: integer
          description: "0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat"
        reportHour:
          type: integer
          description: "Hour 0-23"
        reportMinute:
          type: integer
          description: "Minute 0-59"
        recipients:
          type: array
          items:
            type: string
        commissionRates:
          type: object
          additionalProperties:
            type: number
          description: "Fair Market Value rates per commission type"
        commissionTable:
          type: array
          items:
            $ref: "#/components/schemas/CommissionTableRow"
          nullable: true
          description: "Uploaded commission lookup table"
        logoPath:
          type: ["string", "null"]
          description: "Object path for uploaded agency logo"
        brandColor:
          type: ["string", "null"]
          description: "Hex color string for agency brand color"
        panelColor:
          type: ["string", "null"]
          description: "Hex color string for the sidebar panel background"
        brandName:
          type: ["string", "null"]
          description: "Agency name shown in the app"
        carrierColors:
          type: object
          additionalProperties:
            type: string
          description: "Map of carrier name to hex color code"
          nullable: true
      required:
        - reportDayOfWeek
        - reportHour
        - reportMinute
        - recipients
        - commissionRates
        - commissionTable
        - logoPath
        - brandColor
        - panelColor
        - brandName

    UpdateSettingsBody:
      type: object
      properties:
        reportDayOfWeek:
          type: integer
        reportHour:
          type: integer
        reportMinute:
          type: integer
        recipients:
          type: array
          items:
            type: string
        commissionRates:
          type: object
          additionalProperties:
            type: number
        commissionTable:
          type: array
          items:
            $ref: "#/components/schemas/CommissionTableRow"
          nullable: true
        logoPath:
          type: ["string", "null"]
        brandColor:
          type: ["string", "null"]
