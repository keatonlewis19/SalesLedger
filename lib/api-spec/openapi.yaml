openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sales
    description: Sales entry operations
  - name: reports
    description: Weekly report operations
  - name: settings
    description: App configuration settings
  - name: users
    description: Agency user management
  - name: storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List all sales entries
      parameters:
        - name: weekStart
          in: query
          required: false
          schema:
            type: string
          description: ISO date string for the start of the week filter
      responses:
        "200":
          description: List of sales entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleEntry"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a new sale entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "201":
          description: Created sale entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleEntry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales/{id}/paid:
    patch:
      operationId: markSalePaid
      tags: [sales]
      summary: Toggle the paid status of a sale (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paid:
                  type: boolean
              required:
                - paid
      responses:
        "200":
          description: Updated sale entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleEntry"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user's agency profile
      responses:
        "200":
          description: Current agency user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyUser"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyUser"

  /users:
    get:
      operationId: listAgencyUsers
      tags: [users]
      summary: List all agency users (admin only)
      responses:
        "200":
          description: List of agency users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgencyUser"

  /users/invite:
    post:
      operationId: inviteAgent
      tags: [users]
      summary: Invite a new agent by email (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                role:
                  type: string
                redirectUrl:
                  type: string
                  description: "URL to redirect the invited user to after accepting the invite"
              required:
                - email
      responses:
        "200":
          description: Invitation sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
              required:
                - role
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyUser"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get a single sale entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSale
      tags: [sales]
      summary: Update a sale entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSaleBody"
      responses:
        "200":
          description: Updated sale entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSale
      tags: [sales]
      summary: Delete a sale entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales/summary/current-week:
    get:
      operationId: getCurrentWeekSummary
      tags: [sales]
      summary: Get summary stats for the current week
      responses:
        "200":
          description: Weekly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekSummary"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List all weekly reports
      responses:
        "200":
          description: List of sent weekly reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyReport"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current app settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/send:
    post:
      operationId: sendReport
      tags: [reports]
      summary: Manually trigger sending the weekly report now
      responses:
        "200":
          description: Report sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendReportResponse"
        "400":
          description: Error sending report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CommissionTableRow:
      type: object
      properties:
        salesSource:
          type: string
        salesType:
          type: string
        commissionType:
          type: string
        estimatedCommission:
          type: ["number", "null"]
      required:
        - salesSource
        - salesType
        - commissionType
        - estimatedCommission

    AppSettings:
      type: object
      properties:
        reportDayOfWeek:
          type: integer
          description: "0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat"
        reportHour:
          type: integer
          description: "Hour 0-23"
        reportMinute:
          type: integer
          description: "Minute 0-59"
        recipients:
          type: array
          items:
            type: string
        commissionRates:
          type: object
          additionalProperties:
            type: number
          description: "Fair Market Value rates per commission type"
        commissionTable:
          type: array
          items:
            $ref: "#/components/schemas/CommissionTableRow"
          nullable: true
          description: "Uploaded commission lookup table"
        logoPath:
          type: ["string", "null"]
          description: "Object path for uploaded agency logo"
        brandColor:
          type: ["string", "null"]
          description: "Hex color string for agency brand color"
        panelColor:
          type: ["string", "null"]
          description: "Hex color string for the sidebar panel background"
        brandName:
          type: ["string", "null"]
          description: "Agency name shown in the app"
      required:
        - reportDayOfWeek
        - reportHour
        - reportMinute
        - recipients
        - commissionRates
        - commissionTable
        - logoPath
        - brandColor
        - panelColor
        - brandName

    UpdateSettingsBody:
      type: object
      properties:
        reportDayOfWeek:
          type: integer
        reportHour:
          type: integer
        reportMinute:
          type: integer
        recipients:
          type: array
          items:
            type: string
        commissionRates:
          type: object
          additionalProperties:
            type: number
        commissionTable:
          type: array
          items:
            $ref: "#/components/schemas/CommissionTableRow"
          nullable: true
        logoPath:
          type: ["string", "null"]
        brandColor:
          type: ["string", "null"]
        panelColor:
          type: ["string", "null"]
        brandName:
          type: ["string", "null"]

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string

    UpdateMeBody:
      type: object
      properties:
        fullName:
          type: ["string", "null"]

    AgencyUser:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        role:
          type: string
        fullName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - clerkUserId
        - role
        - fullName
        - email
        - createdAt
        - updatedAt

    SaleEntry:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: ["string", "null"]
        agentName:
          type: ["string", "null"]
        clientName:
          type: string
        owningAgent:
          type: ["string", "null"]
        salesSource:
          type: ["string", "null"]
        salesType:
          type: string
        soldDate:
          type: string
        effectiveDate:
          type: ["string", "null"]
        commissionType:
          type: string
        leadSource:
          type: ["string", "null"]
        hra:
          type: ["number", "null"]
        annualPremium:
          type: ["number", "null"]
        estimatedCommission:
          type: ["number", "null"]
        comments:
          type: ["string", "null"]
        paid:
          type: boolean
        weekStart:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - clientName
        - owningAgent
        - salesSource
        - salesType
        - soldDate
        - effectiveDate
        - commissionType
        - leadSource
        - hra
        - annualPremium
        - estimatedCommission
        - comments
        - paid
        - weekStart
        - createdAt
        - updatedAt

    CreateSaleBody:
      type: object
      properties:
        clientName:
          type: string
        salesSource:
          type: ["string", "null"]
        salesType:
          type: string
        soldDate:
          type: string
        effectiveDate:
          type: ["string", "null"]
        commissionType:
          type: string
        leadSource:
          type: ["string", "null"]
        hra:
          type: ["number", "null"]
        annualPremium:
          type: ["number", "null"]
        estimatedCommission:
          type: ["number", "null"]
        comments:
          type: ["string", "null"]
      required:
        - clientName
        - salesType
        - soldDate
        - commissionType

    UpdateSaleBody:
      type: object
      properties:
        clientName:
          type: string
        salesSource:
          type: ["string", "null"]
        salesType:
          type: string
        soldDate:
          type: string
        effectiveDate:
          type: ["string", "null"]
        commissionType:
          type: string
        leadSource:
          type: ["string", "null"]
        hra:
          type: ["number", "null"]
        annualPremium:
          type: ["number", "null"]
        estimatedCommission:
          type: ["number", "null"]
        comments:
          type: ["string", "null"]

    WeekSummary:
      type: object
      properties:
        totalSales:
          type: integer
        totalEstimatedCommission:
          type: number
        byOwningAgent:
          type: array
          items:
            type: object
            properties:
              agent:
                type: string
              count:
                type: integer
            required:
              - agent
              - count
        bySalesType:
          type: array
          items:
            type: object
            properties:
              salesType:
                type: string
              count:
                type: integer
            required:
              - salesType
              - count
        weekStart:
          type: string
        weekEnd:
          type: string
      required:
        - totalSales
        - totalEstimatedCommission
        - byOwningAgent
        - bySalesType
        - weekStart
        - weekEnd

    WeeklyReport:
      type: object
      properties:
        id:
          type: integer
        weekStart:
          type: string
        weekEnd:
          type: string
        sentAt:
          type: string
        totalSales:
          type: integer
        totalEstimatedCommission:
          type: number
        recipients:
          type: string
      required:
        - id
        - weekStart
        - weekEnd
        - sentAt
        - totalSales
        - totalEstimatedCommission
        - recipients

    SendReportResponse:
      type: object
      properties:
        message:
          type: string
        reportId:
          type: integer
      required:
        - message
        - reportId
