name: Build and Submit iOS

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build iOS (Production)
    type: build
    working_directory: artifacts/mobile
    params:
      platform: ios
      profile: production

  submit:
    name: Submit to TestFlight
    type: submit
    needs:
      - build
    working_directory: artifacts/mobile
    params:
      platform: ios
      profile: production
