kind = "web"
previewPath = "/"
title = "Weekly Sales Tracker"
version = "1.0.0"
id = "artifacts/sales-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22084

[services.development]
run = "pnpm --filter @workspace/sales-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sales-tracker", "run", "build" ]
publicDir = "artifacts/sales-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22084"
BASE_PATH = "/"
